name: CI/CD (deploy branch)

on:
  push:
    branches: [deploy]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy on self-hosted runner
    runs-on: self-hosted
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Generate deploy environment file
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          DB_APP_USER: ${{ secrets.DB_APP_USER }}
          DB_APP_PASSWORD: ${{ secrets.DB_APP_PASSWORD }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -e
          required=(POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB FRONTEND_URL BACKEND_URL JWT_SECRET)
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "❌ Missing required secret: $key"
              exit 1
            fi
          done

          FRONTEND_URL="${FRONTEND_URL%/}"
          BACKEND_URL="${BACKEND_URL%/}"
          NEXT_PUBLIC_API_URL="/api"
          INTERNAL_API_URL="http://backend:4004/api"
          if [ -z "$ALLOWED_ORIGINS" ]; then
            ALLOWED_ORIGINS="$FRONTEND_URL"
          fi
          if [ -z "${DB_APP_USER:-}" ] || [ -z "${DB_APP_PASSWORD:-}" ]; then
            echo "❌ Missing DB app credentials."
            echo "Set both DB_APP_USER and DB_APP_PASSWORD in repository secrets."
            exit 1
          fi

          if [ "$DB_APP_USER" = "postgres" ] || [ "$DB_APP_USER" = "$POSTGRES_USER" ]; then
            echo "❌ DB_APP_USER must be a dedicated non-superuser role (not postgres)."
            echo "Create an app role (for example faq_app_user) and set DB_APP_USER to that role."
            exit 1
          fi

          DB_APP_USER_ENC="$(node -e 'process.stdout.write(encodeURIComponent(process.argv[1] || ""))' "$DB_APP_USER")"
          DB_APP_PASSWORD_ENC="$(node -e 'process.stdout.write(encodeURIComponent(process.argv[1] || ""))' "$DB_APP_PASSWORD")"
          DATABASE_URL="postgresql://${DB_APP_USER_ENC}:${DB_APP_PASSWORD_ENC}@postgres:5432/${POSTGRES_DB}"
          ENV_FILE_TMP="deploy/.env.production.ci"
          echo "DOCKER_ENV_FILE=${ENV_FILE_TMP}" >> "$GITHUB_ENV"

          cat > "$ENV_FILE_TMP" <<EOF
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          DB_APP_USER=${DB_APP_USER}
          DB_APP_PASSWORD=${DB_APP_PASSWORD}
          DATABASE_URL=${DATABASE_URL}
          FRONTEND_URL=${FRONTEND_URL}
          BACKEND_URL=${BACKEND_URL}
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          INTERNAL_API_URL=${INTERNAL_API_URL}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
          JWT_SECRET=${JWT_SECRET}
          EOF
          echo "✅ ${ENV_FILE_TMP} generated from secrets"

      - name: 🐳 Resolve Docker Compose command
        shell: bash
        run: |
          set -euo pipefail

          echo "🔎 Runner diagnostics (non-sensitive)"
          whoami || true
          id || true
          groups || true
          ls -l /var/run/docker.sock || true
          docker --version || true
          docker compose version || true

          if docker info > /dev/null 2>&1; then
            echo "DOCKER_COMPOSE=docker compose" >> "$GITHUB_ENV"
            echo "✅ Using docker compose without sudo"
            exit 0
          fi

          if sudo -n docker info > /dev/null 2>&1; then
            echo "DOCKER_COMPOSE=sudo -n docker compose" >> "$GITHUB_ENV"
            echo "✅ Using docker compose with passwordless sudo"
            exit 0
          fi

          echo "❌ Docker is not accessible for the runner user."
          echo "Fix one of these on the self-hosted runner:"
          echo "1) Add runner user to the docker group and restart runner."
          echo "2) Allow passwordless sudo for /usr/bin/docker."
          exit 1

      - name: 🛑 Stop existing services
        run: |
          ${DOCKER_COMPOSE} --env-file "${DOCKER_ENV_FILE}" -f deploy/docker-compose.deploy.yml down --remove-orphans || true

      - name: 🏗️ Build and start services
        run: |
          set -euo pipefail
          COMPOSE_BASE="${DOCKER_COMPOSE} --env-file ${DOCKER_ENV_FILE} -f deploy/docker-compose.deploy.yml"
          if ${COMPOSE_BASE} up -d --build; then
            exit 0
          fi

          echo "⚠️ Initial compose build failed. Attempting BuildKit cache/snapshot recovery and retry..."
          docker builder prune -f || true
          docker image prune -f || true
          ${COMPOSE_BASE} build --pull --no-cache
          ${COMPOSE_BASE} up -d

      - name: ⏱️ Wait for startup
        run: |
          sleep 20

      - name: 🧪 Check Database Connectivity
        run: |
          set -euo pipefail
          set -a
          . "${DOCKER_ENV_FILE}"
          set +a

          EFFECTIVE_DB_USER="$DB_APP_USER"
          EFFECTIVE_DB_PASSWORD="$DB_APP_PASSWORD"

          echo "🔎 DB probe user=${EFFECTIVE_DB_USER} db=${POSTGRES_DB}"
          ${DOCKER_COMPOSE} --env-file "${DOCKER_ENV_FILE}" -f deploy/docker-compose.deploy.yml exec -T postgres \
            sh -lc 'PGPASSWORD="$1" psql -h 127.0.0.1 -U "$2" -d "$3" -c "select current_user, current_database();"' \
            sh "$EFFECTIVE_DB_PASSWORD" "$EFFECTIVE_DB_USER" "$POSTGRES_DB"
          echo "✅ Database connectivity ok"

      - name: 📌 Promote deploy env file
        run: |
          cp "${DOCKER_ENV_FILE}" deploy/.env.production
          echo "✅ Promoted ${DOCKER_ENV_FILE} -> deploy/.env.production"

      - name: 🏥 Check Backend Health
        run: |
          for i in {1..15}; do
            if curl -fsS http://localhost:4004/health > /dev/null; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/15: Backend not ready, waiting 5s..."
            sleep 5
          done
          echo "❌ Backend health check failed!"
          exit 1

      - name: 🌐 Check Frontend Health
        run: |
          for i in {1..15}; do
            if curl -fsS http://localhost:3004/login > /dev/null; then
              echo "✅ Frontend is healthy!"
              exit 0
            fi
            echo "Attempt $i/15: Frontend not ready, waiting 5s..."
            sleep 5
          done
          echo "❌ Frontend health check failed!"
          exit 1

      - name: ✅ Deployment status
        run: |
          ${DOCKER_COMPOSE} --env-file "${DOCKER_ENV_FILE}" -f deploy/docker-compose.deploy.yml ps

      - name: 📋 Dump logs on failure
        if: failure()
        run: |
          ${DOCKER_COMPOSE} --env-file "${DOCKER_ENV_FILE:-deploy/.env.production}" -f deploy/docker-compose.deploy.yml logs --tail=200 || true
