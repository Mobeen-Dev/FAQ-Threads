name: CI/CD (deploy branch)

on:
  push:
    branches: [deploy]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy on self-hosted runner
    runs-on: self-hosted
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Generate deploy environment file
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -e
          required=(POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB FRONTEND_URL BACKEND_URL JWT_SECRET)
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "❌ Missing required secret: $key"
              exit 1
            fi
          done

          FRONTEND_URL="${FRONTEND_URL%/}"
          BACKEND_URL="${BACKEND_URL%/}"
          NEXT_PUBLIC_API_URL="/api"
          INTERNAL_API_URL="http://backend:4004/api"
          if [ -z "$ALLOWED_ORIGINS" ]; then
            ALLOWED_ORIGINS="$FRONTEND_URL"
          fi

          cat > deploy/.env.production <<EOF
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          FRONTEND_URL=${FRONTEND_URL}
          BACKEND_URL=${BACKEND_URL}
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          INTERNAL_API_URL=${INTERNAL_API_URL}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
          JWT_SECRET=${JWT_SECRET}
          EOF
          echo "✅ deploy/.env.production generated from secrets"

      - name: 🐳 Resolve Docker Compose command
        shell: bash
        run: |
          set -euo pipefail

          if docker info > /dev/null 2>&1; then
            echo "DOCKER_COMPOSE=docker compose" >> "$GITHUB_ENV"
            echo "✅ Using docker compose without sudo"
            exit 0
          fi

          if sudo -n docker info > /dev/null 2>&1; then
            echo "DOCKER_COMPOSE=sudo -n docker compose" >> "$GITHUB_ENV"
            echo "✅ Using docker compose with passwordless sudo"
            exit 0
          fi

          echo "❌ Docker is not accessible for the runner user."
          echo "Fix one of these on the self-hosted runner:"
          echo "1) Add runner user to the docker group and restart runner."
          echo "2) Allow passwordless sudo for /usr/bin/docker."
          exit 1

      - name: 🛑 Stop existing services
        run: |
          ${DOCKER_COMPOSE} --env-file deploy/.env.production -f deploy/docker-compose.deploy.yml down --remove-orphans || true

      - name: 🏗️ Build and start services
        run: |
          ${DOCKER_COMPOSE} --env-file deploy/.env.production -f deploy/docker-compose.deploy.yml up -d --build

      - name: ⏱️ Wait for startup
        run: |
          sleep 20

      - name: 🏥 Check Backend Health
        run: |
          for i in {1..15}; do
            if curl -fsS http://localhost:4004/health > /dev/null; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/15: Backend not ready, waiting 5s..."
            sleep 5
          done
          echo "❌ Backend health check failed!"
          exit 1

      - name: 🌐 Check Frontend Health
        run: |
          for i in {1..15}; do
            if curl -fsS http://localhost:3004/login > /dev/null; then
              echo "✅ Frontend is healthy!"
              exit 0
            fi
            echo "Attempt $i/15: Frontend not ready, waiting 5s..."
            sleep 5
          done
          echo "❌ Frontend health check failed!"
          exit 1

      - name: ✅ Deployment status
        run: |
          ${DOCKER_COMPOSE} --env-file deploy/.env.production -f deploy/docker-compose.deploy.yml ps

      - name: 📋 Dump logs on failure
        if: failure()
        run: |
          ${DOCKER_COMPOSE} --env-file deploy/.env.production -f deploy/docker-compose.deploy.yml logs --tail=200 || true
