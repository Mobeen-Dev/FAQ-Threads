# =============================================================================
# FAQ App - Production Deployment Pipeline
# =============================================================================
# This workflow deploys the FAQ App using a self-hosted GitHub Actions runner
#
# Prerequisites:
#   - Self-hosted runner configured on your Ubuntu server
#   - Docker and Docker Compose installed on the server
#   - Runner has access to repository
#
# Required GitHub Secrets (Repository → Settings → Secrets → Actions):
#   Database:
#     - DB_USER: PostgreSQL username (e.g., faquser)
#     - DB_PASSWORD: PostgreSQL password (strong, 32+ chars)
#     - DB_NAME: Database name (e.g., faq_app)
#     - DB_PORT: Database port (e.g., 5434)
#   
#   Backend:
#     - NODE_ENV: Environment (production)
#     - BACKEND_PORT: Backend API port (e.g., 4004)
#     - JWT_SECRET: JWT signing secret (64+ chars)
#   
#   URLs:
#     - FRONTEND_URL: Public frontend URL
#     - BACKEND_URL: Internal backend URL (http://localhost:4004)
#     - PUBLIC_BACKEND_URL: Public backend API URL
#   
#   Frontend:
#     - FRONTEND_PORT: Frontend port (e.g., 3004)
#     - NEXT_PUBLIC_API_URL: Browser-accessible API URL
#
# Optional Secrets:
#   - SLACK_WEBHOOK_URL: For deployment notifications (optional)
# =============================================================================

name: 🚀 Deploy FAQ App

on:
  push:
    branches: [ deploy ]
  workflow_dispatch: # Manual trigger button in GitHub UI

jobs:
  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    
    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout code
      # -----------------------------------------------------------------------
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      # -----------------------------------------------------------------------
      # Step 2: Create environment file from individual secrets
      # -----------------------------------------------------------------------
      - name: 🔧 Configure Environment Variables
        run: |
          echo "Creating .env file from GitHub Secrets..."
          cat > .env << EOF
          # Database Configuration
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PORT=${{ secrets.DB_PORT }}
          
          # Backend Configuration
          NODE_ENV=${{ secrets.NODE_ENV || 'production' }}
          BACKEND_PORT=${{ secrets.BACKEND_PORT }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          
          # URLs
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          BACKEND_URL=${{ secrets.BACKEND_URL }}
          PUBLIC_BACKEND_URL=${{ secrets.PUBLIC_BACKEND_URL }}
          
          # Frontend Configuration
          FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          EOF
          
          # Validate .env file
          if [ ! -s .env ]; then
            echo "❌ ERROR: .env file is empty or not created"
            exit 1
          fi
          
          echo "✅ Environment file created successfully"
          echo "File size: $(stat -c%s .env 2>/dev/null || stat -f%z .env) bytes"
          
          # Validate required variables
          echo "Validating required variables..."
          REQUIRED_VARS=("DB_PASSWORD" "JWT_SECRET" "DB_USER" "DB_NAME")
          MISSING_VARS=()
          
          for var in "${REQUIRED_VARS[@]}"; do
            if ! grep -q "^${var}=" .env || grep -q "^${var}=$" .env; then
              MISSING_VARS+=("$var")
            fi
          done
          
          if [ ${#MISSING_VARS[@]} -gt 0 ]; then
            echo "❌ ERROR: Missing or empty required variables: ${MISSING_VARS[*]}"
            echo "Please add these secrets in GitHub: Settings → Secrets → Actions"
            exit 1
          else
            echo "✅ All required variables validated"
          fi
      
      # -----------------------------------------------------------------------
      # Step 3: Stop current services and free ports
      # -----------------------------------------------------------------------
      - name: 🛑 Stop Current Services
        run: |
          echo "Stopping project-specific services..."
          docker stop faq-db faq-backend faq-frontend 2>/dev/null || echo "Containers not running"
          docker rm faq-db faq-backend faq-frontend 2>/dev/null || echo "Containers not found"
          
          # Check for any processes using the required ports
          echo "Checking for port conflicts..."
          for port in 3000 3004 4004 5432 5434; do
            if sudo lsof -ti:$port >/dev/null 2>&1; then
              echo "⚠️  Port $port is in use, attempting to free it..."
              # Kill any Docker containers using these ports
              sudo docker ps --filter "publish=$port" -q | xargs -r docker stop 2>/dev/null || true
            fi
          done
          
          echo "✅ All services stopped and ports freed"
      
      # -----------------------------------------------------------------------
      # Step 4: Clean up old images (optional)
      # -----------------------------------------------------------------------
      - name: 🧹 Clean Up Old Images
        run: |
          echo "Cleaning up old images..."
          docker system prune -f || true
      
      # -----------------------------------------------------------------------
      # Step 5: Build and start services
      # -----------------------------------------------------------------------
      - name: 🏗️ Build and Start Services
        run: |
          echo "Building and starting services..."
          
          # Determine Docker Compose command
          if docker compose version &> /dev/null; then
            DOCKER_COMPOSE="docker compose"
          else
            DOCKER_COMPOSE="docker-compose"
          fi
          
          echo "Using: $DOCKER_COMPOSE"
          $DOCKER_COMPOSE up -d --build
      
      # -----------------------------------------------------------------------
      # Step 6: Wait for services to initialize
      # -----------------------------------------------------------------------
      - name: ⏱️ Wait for Services to Start
        run: |
          echo "Waiting for services to initialize..."
          sleep 30
      
      # -----------------------------------------------------------------------
      # Step 7: Check database health
      # -----------------------------------------------------------------------
      - name: 🗄️ Check Database Health
        run: |
          echo "Checking PostgreSQL health..."
          for i in {1..12}; do
            if docker exec faq-db pg_isready -U faquser 2>/dev/null; then
              echo "✅ Database is healthy!"
              break
            fi
            echo "Attempt $i/12: Database not ready, waiting 10s..."
            sleep 10
            if [ $i -eq 12 ]; then
              echo "❌ Database health check failed!"
              exit 1
            fi
          done
      
      # -----------------------------------------------------------------------
      # Step 8: Check backend health
      # -----------------------------------------------------------------------
      - name: 🏥 Check Backend Health
        run: |
          echo "Checking Backend API health..."
          
          # Get backend port from .env (default to 4004)
          BACKEND_PORT=$(grep "^BACKEND_PORT=" .env | cut -d'=' -f2 || echo "4004")
          
          for i in {1..10}; do
            if curl -f http://localhost:${BACKEND_PORT}/api/health 2>/dev/null || curl -f http://localhost:${BACKEND_PORT} 2>/dev/null; then
              echo "✅ Backend is healthy on port ${BACKEND_PORT}!"
              break
            fi
            echo "Attempt $i/10: Backend not ready, waiting 10s..."
            sleep 10
            if [ $i -eq 10 ]; then
              echo "❌ Backend health check failed!"
              exit 1
            fi
          done
      
      # -----------------------------------------------------------------------
      # Step 9: Check frontend health
      # -----------------------------------------------------------------------
      - name: 🌐 Check Frontend Health
        run: |
          echo "Checking Frontend health..."
          
          # Get frontend port from .env (default to 3004)
          FRONTEND_PORT=$(grep "^FRONTEND_PORT=" .env | cut -d'=' -f2 || echo "3004")
          
          for i in {1..10}; do
            if curl -f http://localhost:${FRONTEND_PORT} 2>/dev/null; then
              echo "✅ Frontend is healthy on port ${FRONTEND_PORT}!"
              break
            fi
            echo "Attempt $i/10: Frontend not ready, waiting 10s..."
            sleep 10
            if [ $i -eq 10 ]; then
              echo "❌ Frontend health check failed!"
              exit 1
            fi
          done
      
      # -----------------------------------------------------------------------
      # Step 10: Deployment success
      # -----------------------------------------------------------------------
      - name: ✅ Deployment Success
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 Deployment completed successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📝 Deployment Summary:"
          echo "   • Commit: $(git rev-parse --short HEAD)"
          echo "   • Branch: ${{ github.ref_name }}"
          echo "   • Timestamp: $(date)"
          echo ""
          echo "🌐 Service URLs:"
          echo "   • Frontend: http://localhost:3004"
          echo "   • Backend:  http://localhost:4004"
          echo "   • Database: localhost:5432"
          echo ""
          echo "📊 Container Status:"
          
          # Determine Docker Compose command
          if docker compose version &> /dev/null; then
            docker compose ps
          else
            docker-compose ps
          fi
      
      # -----------------------------------------------------------------------
      # Step 11: Rollback on failure
      # -----------------------------------------------------------------------
      - name: 🚨 Rollback on Failure
        if: failure()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "💥 Deployment failed! Attempting rollback..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Determine Docker Compose command
          if docker compose version &> /dev/null; then
            DOCKER_COMPOSE="docker compose"
          else
            DOCKER_COMPOSE="docker-compose"
          fi
          
          # Stop failed deployment
          $DOCKER_COMPOSE down
          
          # Try to restore from backup images
          if docker image ls | grep -q "faq.*backup"; then
            echo "Found backup images, attempting rollback..."
            
            # Tag backup images as latest
            for service in backend frontend; do
              if docker image ls | grep -q "faq-${service}.*backup"; then
                echo "Restoring ${service} from backup..."
                docker tag faq-${service}:backup faq-${service}:latest
              fi
            done
            
            # Start with backup images
            $DOCKER_COMPOSE up -d
            sleep 30
            
            # Verify rollback
            if curl -f http://localhost:4004 2>/dev/null && curl -f http://localhost:3004 2>/dev/null; then
              echo "✅ Rollback successful!"
            else
              echo "❌ Rollback failed! Manual intervention required."
              exit 1
            fi
          else
            echo "⚠️  No backup images available. Manual intervention required."
            exit 1
          fi

