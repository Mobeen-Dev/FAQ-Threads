# =============================================================================
# FAQ App - CI/CD Pipeline
# =============================================================================
# This workflow builds, tests, and deploys the FAQ App
#
# Required GitHub Secrets:
#   - DB_PASSWORD: PostgreSQL password
#   - JWT_SECRET: JWT signing secret (min 32 chars)
#   - DEPLOY_HOST: Server IP or hostname
#   - DEPLOY_USER: SSH username for deployment
#   - DEPLOY_KEY: SSH private key for deployment
#   - DEPLOY_PATH: Path on server (e.g., /opt/faq-app)
#
# Optional Secrets:
#   - DOCKER_REGISTRY: Custom registry (default: ghcr.io)
#   - PUBLIC_BACKEND_URL: Public API URL
#   - SLACK_WEBHOOK_URL: For deployment notifications
# =============================================================================
name: CI/CD Pipeline Deploy

on:
  push:
    branches: [ master, deploy ]
  workflow_dispatch: # Manual trigger button in GitHub UI

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    - name: Debug info
      run: echo "Branch is ${{ github.ref }} / ${{ github.head_ref }}"

