services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: faq-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-faquser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-faq_app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-faquser} -d ${DB_NAME:-faq_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: faq-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4004
      DATABASE_URL: postgresql://${DB_USER:-faquser}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-faq_app}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-secret-change-in-production-min-32-chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:4004}
      PUBLIC_BACKEND_URL: ${PUBLIC_BACKEND_URL:-http://localhost:4004}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      # Email Configuration
      RESEND_API_KEY: ${RESEND_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-FAQ Manager}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO}
      EMAIL_TOKEN_SECRET: ${EMAIL_TOKEN_SECRET}
      PASSWORD_RESET_EXPIRY_HOURS: ${PASSWORD_RESET_EXPIRY_HOURS:-1}
      EMAIL_VERIFY_EXPIRY_HOURS: ${EMAIL_VERIFY_EXPIRY_HOURS:-24}
      EMAIL_QUEUE_ENABLED: ${EMAIL_QUEUE_ENABLED:-true}
      EMAIL_RETRY_ATTEMPTS: ${EMAIL_RETRY_ATTEMPTS:-3}
      EMAIL_RETRY_DELAY_MS: ${EMAIL_RETRY_DELAY_MS:-60000}
      EMAIL_BATCH_SIZE: ${EMAIL_BATCH_SIZE:-10}
      ENABLE_REPORT_EMAILS: ${ENABLE_REPORT_EMAILS:-true}
      REPORT_CRON_DAILY: ${REPORT_CRON_DAILY:-0 8 * * *}
      REPORT_CRON_WEEKLY: ${REPORT_CRON_WEEKLY:-0 8 * * 1}
      REPORT_CRON_MONTHLY: ${REPORT_CRON_MONTHLY:-0 8 1 * *}
      REPORT_TIMEZONE: ${REPORT_TIMEZONE:-UTC}
      SEND_WELCOME_EMAIL: ${SEND_WELCOME_EMAIL:-true}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      ENABLE_UNSUBSCRIBE: ${ENABLE_UNSUBSCRIBE:-true}
      EMAIL_PREVIEW_MODE: ${EMAIL_PREVIEW_MODE:-false}
      EMAIL_LOG_LEVEL: ${EMAIL_LOG_LEVEL:-info}
    ports:
      - "${BACKEND_PORT:-4004}:4004"

  # Frontend Next.js App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4004/api}
        INTERNAL_API_URL: http://backend:4004/api
    container_name: faq-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      INTERNAL_API_URL: http://backend:4004/api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
